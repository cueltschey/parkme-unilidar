<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LiDAR Viewer</title>
<style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
</style>

<!-- Import map -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.157.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

let scene, camera, renderer, controls;
let points;

const POINT_LIFETIME_MS = 100000; // 5000;
let pointBuffer = [];

init();
animate();

function init() {

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, -10, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = true;

    const geometry = new THREE.BufferGeometry();
    const material = new THREE.PointsMaterial({
        size: 0.05,
        vertexColors: true
    });

    points = new THREE.Points(geometry, material);
    scene.add(points);

    window.addEventListener('resize', onWindowResize);

    connectWebSocket();
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);

    removeOldPoints();
    updateGeometry();

    controls.update();
    renderer.render(scene, camera);
}

function connectWebSocket() {
    const ws = new WebSocket("ws://localhost:9002");

    ws.onmessage = (event) => {
        try {
            const cloud = JSON.parse(event.data);
            appendPointCloud(cloud);
        } catch (e) {
            console.error("Parse error:", e);
        }
    };

    ws.onclose = () => setTimeout(connectWebSocket, 3000);
}

function appendPointCloud(cloud) {
    const now = performance.now();

    for (const p of cloud.points) {
        pointBuffer.push({
            x: p.x,
            y: p.y,
            z: p.z,
            intensity: p.intensity || 0.5,
            cluster_id: p.cluster_id ?? -1,
            time: now
        });
    }
}

function removeOldPoints() {
    const now = performance.now();
    pointBuffer = pointBuffer.filter(p => now - p.time <= POINT_LIFETIME_MS);
}

function updateGeometry() {
    const numPoints = pointBuffer.length;

    const positions = new Float32Array(numPoints * 3);
    const colors = new Float32Array(numPoints * 3);

    for (let i = 0; i < numPoints; i++) {
	const p = pointBuffer[i];

	positions[3*i]   = p.x;
	positions[3*i+1] = p.y;
	positions[3*i+2] = p.z;

	const [r, g, b] = hashClusterToColor(p.cluster_id);

	// Optional: modulate brightness by intensity
	const brightness = p.intensity;
	colors[3*i]   = r * brightness;
	colors[3*i+1] = g * brightness;
	colors[3*i+2] = b * brightness;
    }

    points.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    points.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}

function hashClusterToColor(clusterId) {
    // Default gray for undefined or negative cluster IDs
    if (clusterId === undefined || clusterId < 0) {
        return [0.5, 0.5, 0.5];
    }

    // Map of clusterId → RGB color (normalized 0–1)
    const clusterColors = {
        0: [1.0, 0.0, 0.0],   // Red
        1: [0.0, 1.0, 0.0],   // Green
        2: [0.0, 0.0, 1.0],   // Blue
        3: [1.0, 1.0, 0.0],   // Yellow
        4: [1.0, 0.0, 1.0],   // Magenta
        5: [0.0, 1.0, 1.0],   // Cyan
        6: [0.5, 0.5, 0.0],   // Olive
        7: [0.5, 0.0, 0.5],   // Purple
        8: [0.0, 0.5, 0.5],   // Teal
        9: [0.75, 0.25, 0.25],// Brownish
        10:[0.25, 0.75, 0.25] // Light Green
    };

    // Use mapped color if clusterId exists, otherwise gray
    return clusterColors[clusterId] || [0.5, 0.5, 0.5];
}
</script>

</body>
</html>
