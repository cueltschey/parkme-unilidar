<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LiDAR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0a; }
    canvas { display: block; }

    #overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      z-index: 10;
      font: 12px/1.5 monospace;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.65);
      color: #ddd;
      backdrop-filter: blur(4px);
    }
    #conn-label.connected    { color: #4f4; }
    #conn-label.disconnected { color: #f44; }

    #fps-counter {
      position: fixed;
      bottom: 8px;
      right: 8px;
      font: 11px monospace;
      color: #888;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <span class="badge"><span id="conn-label" class="disconnected">⬤ Disconnected</span></span>
    <span class="badge" id="info-label">&nbsp;</span>
  </div>
  <div id="fps-counter">-- fps</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
