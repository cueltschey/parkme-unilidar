<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LiDAR Point Cloud Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        let points;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(
                75, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.set(0, -10, 5);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Initial empty point cloud
            const geometry = new THREE.BufferGeometry();
            const material = new THREE.PointsMaterial({ size: 0.05, vertexColors: true });
            points = new THREE.Points(geometry, material);
            scene.add(points);

            window.addEventListener('resize', onWindowResize, false);

            connectWebSocket();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        function connectWebSocket() {
            const ws = new WebSocket("ws://localhost:9002"); // Replace with your URL

            ws.onopen = () => {
                console.log("WebSocket connected");
            };

            ws.onmessage = (event) => {
                try {
                    const cloud = JSON.parse(event.data);
                    updatePointCloud(cloud);
                } catch (e) {
                    console.error("Error parsing cloud:", e);
                }
            };

            ws.onclose = () => {
                console.log("WebSocket closed, retrying in 3s...");
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => console.error("WebSocket error:", err);
        }

        function updatePointCloud(cloud) {
            const numPoints = cloud.points.length;
            const positions = new Float32Array(numPoints * 3);
            const colors = new Float32Array(numPoints * 3);

            for (let i = 0; i < numPoints; i++) {
                const p = cloud.points[i];
                positions[3*i] = p.x;
                positions[3*i+1] = p.y;
                positions[3*i+2] = p.z;

                const intensity = p.intensity || 0.5;
                colors[3*i] = intensity;
                colors[3*i+1] = intensity;
                colors[3*i+2] = intensity;
            }

            points.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            points.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;
        }
    </script>
</body>
</html>
