services:
  unilidar:
    image: ghcr.io/cueltschey/parkme-uinlidar 

    build:
      context: lidar
      dockerfile: Dockerfile

    ports:
      - 9002:9002

    env_file:
      - .env
    networks:
      pointcloud:
        ipv4_address: 172.26.1.7
    configs:
      - unilidar.yml
    command: parkme_unilidar -c /unilidar.yml

  renderer:
    image: ghcr.io/cueltschey/parkme-renderer

    build:
      context: renderer
      dockerfile: Dockerfile

    ports:
      - 8080:8080

    env_file:
      - .env
    networks:
      pointcloud:
        ipv4_address: 172.26.1.8
    command: python3 -m http.server 8080




configs:
  unilidar.yml:
    file: ${UNILIDAR_CONFIG:-configs/emulation.yaml}

networks:
  default:
    driver: bridge

  pointcloud:
    name: parkme_pointcloud
    ipam:
      driver: default
      config:
        - subnet: 172.26.1.0/24
